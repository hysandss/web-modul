<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Admin Panel | Premium Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #8b5cf6;
      --accent: #f59e0b;
      --danger: #ef4444;
      --success: #10b981;
      --dark: #0f172a;
      --darker: #020617;
      --card-bg: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --border: #334155;
      --input-bg: #1e293b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
    }

    /* Login Page Premium */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(ellipse at top, #1e3a8a, #020617);
      position: relative;
      overflow: hidden;
    }
    #loginPage::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(45deg, rgba(59,130,246,0.03) 0px, rgba(59,130,246,0.03) 20px, transparent 20px, transparent 40px);
      animation: move 60s linear infinite;
    }
    @keyframes move { from { transform: translate(-10%, -10%) rotate(0deg); } to { transform: translate(-30%, -30%) rotate(360deg); } }
    
    .login-card {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(15px);
      padding: 50px 45px;
      border-radius: 50px;
      text-align: center;
      width: 100%;
      max-width: 460px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 30px 60px -20px black;
      position: relative;
      z-index: 10;
    }
    .login-card h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }
    .login-card p { color: var(--gray); margin-bottom: 30px; font-size: 0.95rem; }
    .login-card input {
      width: 100%;
      padding: 18px 25px;
      margin: 15px 0 20px;
      border: 2px solid var(--border);
      border-radius: 50px;
      background: var(--darker);
      color: white;
      font-size: 1rem;
      transition: 0.2s;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.3);
    }
    .login-card button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 50px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .login-card button:hover { transform: scale(1.02); box-shadow: 0 10px 25px -5px var(--primary); }
    .login-error { color: var(--danger); margin-top: 15px; font-size: 0.9rem; }

    /* Panel Admin */
    #panel { display: none; }
    
    .admin-header {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      padding: 20px 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .admin-header h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.3rem;
      font-weight: 600;
    }
    .admin-header h1 i { color: var(--accent); }
    
    .btn-logout {
      background: var(--danger);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-logout:hover { background: #dc2626; transform: scale(1.02); }

    .container-admin {
      max-width: 1280px;
      margin: 0 auto;
      padding: 30px 25px;
    }

    /* Card Panel */
    .panel-card {
      background: var(--dark);
      border-radius: 40px;
      padding: 35px;
      margin-bottom: 35px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 40px -20px black;
    }
    .panel-card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #e2e8f0;
    }
    .panel-card h2 i { 
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Form Elements */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .form-grid input, .form-grid textarea, .form-grid select {
      padding: 16px 22px;
      border: 2px solid var(--border);
      border-radius: 30px;
      background: var(--input-bg);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: 0.2s;
    }
    .form-grid input:focus, .form-grid textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .form-grid textarea { min-height: 100px; resize: vertical; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px var(--primary); }
    .btn-danger {
      background: var(--danger);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-danger:hover { background: #dc2626; }

    /* Category Tree Structure */
    .category-root {
      margin-top: 20px;
    }
    .category-item {
      background: rgba(0,0,0,0.2);
      border-radius: 28px;
      padding: 25px;
      margin-bottom: 25px;
      border: 1px solid var(--border);
    }
    .category-header {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .category-header input {
      flex: 1;
      min-width: 200px;
      padding: 14px 20px;
      border-radius: 25px;
      background: var(--input-bg);
      border: 2px solid var(--border);
      color: white;
    }
    
    .album-container {
      margin-left: 25px;
      border-left: 3px solid var(--primary);
      padding-left: 25px;
    }
    .album-item {
      background: rgba(255,255,255,0.02);
      border-radius: 24px;
      padding: 20px;
      margin: 20px 0;
      border: 1px dashed var(--border);
    }
    .album-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .album-header input {
      flex: 1;
      padding: 12px 18px;
      border-radius: 22px;
      background: #263445;
      border: 2px solid var(--border);
      color: white;
    }

    .video-list {
      margin-left: 20px;
    }
    .video-item {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      background: #1a2538;
      border-radius: 22px;
      padding: 15px;
      margin: 12px 0;
      align-items: center;
    }
    .video-item input {
      padding: 12px 16px;
      border-radius: 20px;
      background: #2d3a5e;
      border: 2px solid var(--border);
      color: white;
    }

    /* PDF Items */
    .pdf-item {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      background: #1e293b;
      border-radius: 28px;
      padding: 18px;
      margin: 12px 0;
      align-items: center;
    }
    .pdf-item input {
      padding: 14px 18px;
      border-radius: 22px;
      background: var(--input-bg);
      border: 2px solid var(--border);
      color: white;
    }

    /* VIP Editor */
    .vip-editor {
      display: grid;
      gap: 20px;
    }
    .vip-field {
      display: grid;
      gap: 8px;
    }
    .vip-field label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      margin-left: 5px;
    }
    .vip-field input, .vip-field textarea {
      padding: 16px 22px;
      border-radius: 30px;
      background: var(--input-bg);
      border: 2px solid var(--border);
      color: white;
    }
    .vip-field textarea { min-height: 100px; }

    .empty-state {
      text-align: center;
      padding: 50px;
      background: #1e293b;
      border-radius: 40px;
      color: var(--gray);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .video-item { grid-template-columns: 1fr; }
      .pdf-item { grid-template-columns: 1fr; }
      .category-header { flex-direction: column; }
      .album-header { flex-direction: column; }
      .admin-header { padding: 15px 20px; }
      .panel-card { padding: 20px; }
    }
    @media (max-width: 480px) {
      .login-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-card">
    <h1><i class="fas fa-crown"></i> Admin</h1>
    <p>Masukkan password untuk mengelola konten</p>
    <input type="password" id="password" placeholder="••••••••" autofocus>
    <button onclick="login()">Masuk ke Panel</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="panel">
  <div class="admin-header">
    <h1><i class="fas fa-crown" style="color: var(--accent);"></i> Admin Panel · Premium Learning</h1>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <div class="container-admin">
    
    <!-- VIDEO MANAGEMENT -->
    <div class="panel-card">
      <h2><i class="fas fa-video"></i> Manajemen Video</h2>
      
      <div class="form-grid">
        <input id="newCat" placeholder="Nama kategori baru (contoh: MUSIK)">
        <button class="btn-primary" onclick="addCategory()"><i class="fas fa-plus-circle"></i> Tambah Kategori</button>
      </div>
      
      <div id="categoryList" class="category-root"></div>
    </div>

    <!-- PDF MANAGEMENT -->
    <div class="panel-card">
      <h2><i class="fas fa-file-pdf" style="color: #ef4444;"></i> Manajemen PDF</h2>
      
      <div class="form-grid">
        <input id="pdfTitle" placeholder="Judul PDF">
        <input id="pdfLink" placeholder="Link Google Drive / URL">
        <button class="btn-primary" onclick="addPdf()"><i class="fas fa-plus-circle"></i> Tambah PDF</button>
      </div>
      
      <div id="pdfList"></div>
    </div>

    <!-- VIP MANAGEMENT -->
    <div class="panel-card">
      <h2><i class="fas fa-crown" style="color: var(--accent);"></i> Konten VIP & Discord</h2>
      
      <div id="vipEditor" class="vip-editor"></div>
    </div>
  </div>
</div>

<script>
// ================= AUTHENTICATION =================
async function login() {
  const pass = document.getElementById('password').value;
  if (!pass) {
    document.getElementById('loginError').innerText = 'Masukkan password!';
    return;
  }
  
  try {
    const res = await fetch('/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    
    if (!res.ok) throw new Error('Network error');
    
    const data = await res.json();
    if (data.success) {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      loadData();
    } else {
      document.getElementById('loginError').innerText = 'Password salah!';
    }
  } catch (err) {
    document.getElementById('loginError').innerText = 'Gagal koneksi ke server!';
    console.error(err);
  }
}

function logout() { location.reload(); }

// ================= LOAD ALL DATA =================
async function loadData() {
  try {
    const res = await fetch('/data');
    if (!res.ok) throw new Error('Gagal load data');
    const data = await res.json();
    
    renderCategories(data.categories || []);
    renderPdfs(data.pdfs || []);
    renderVip(data.joinVip || {});
  } catch (e) {
    console.warn('Gagal load data. Pastikan server berjalan.');
    document.getElementById('categoryList').innerHTML = '<div class="empty-state"><i class="fas fa-plug"></i> Tidak terhubung ke server. Jalankan node server.js</div>';
  }
}

// ================= RENDER CATEGORIES =================
function renderCategories(categories) {
  if (!categories.length) {
    document.getElementById('categoryList').innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i> Belum ada kategori. Buat kategori pertama!</div>';
    return;
  }
  
  let html = '';
  categories.forEach(cat => {
    html += `
      <div class="category-item">
        <div class="category-header">
          <input type="text" value="${cat.name}" placeholder="Nama kategori" onchange="editItem('category', ${cat.id}, 'name', this.value)">
          <button class="btn-danger" onclick="deleteItem('category', ${cat.id})"><i class="fas fa-trash"></i> Hapus</button>
        </div>
        
        <div class="album-container">
          <div class="form-grid" style="margin-bottom: 15px;">
            <input id="albumInput_${cat.id}" placeholder="Nama album baru">
            <button class="btn-primary" onclick="addAlbum(${cat.id})"><i class="fas fa-plus"></i> Tambah Album</button>
          </div>
          
          ${cat.albums && cat.albums.length ? cat.albums.map(album => `
            <div class="album-item">
              <div class="album-header">
                <input value="${album.name}" placeholder="Nama album" onchange="editItem('album', ${album.id}, 'name', this.value)">
                <button class="btn-danger" onclick="deleteItem('album', ${album.id})"><i class="fas fa-trash"></i> Hapus</button>
              </div>
              
              <div class="form-grid" style="margin: 15px 0;">
                <input id="videoTitle_${album.id}" placeholder="Judul video">
                <input id="videoLink_${album.id}" placeholder="Link YouTube">
                <button class="btn-primary" onclick="addVideo(${album.id})"><i class="fas fa-plus"></i> Video</button>
              </div>
              
              <div class="video-list">
                ${album.videos && album.videos.length ? album.videos.map(video => `
                  <div class="video-item">
                    <input value="${video.title}" onchange="editItem('video', ${video.id}, 'title', this.value)" placeholder="Judul">
                    <input value="${video.link}" onchange="editItem('video', ${video.id}, 'link', this.value)" placeholder="Link">
                    <button class="btn-danger" onclick="deleteItem('video', ${video.id})"><i class="fas fa-trash"></i></button>
                  </div>
                `).join('') : '<div class="empty-state" style="padding: 20px;">Belum ada video</div>'}
              </div>
            </div>
          `).join('') : '<div class="empty-state" style="padding: 20px;">Belum ada album</div>'}
        </div>
      </div>
    `;
  });
  
  document.getElementById('categoryList').innerHTML = html;
}

// ================= RENDER PDFs =================
function renderPdfs(pdfs) {
  if (!pdfs.length) {
    document.getElementById('pdfList').innerHTML = '<div class="empty-state"><i class="fas fa-file-pdf"></i> Belum ada PDF. Tambahkan PDF!</div>';
    return;
  }
  
  let html = '';
  pdfs.forEach(pdf => {
    html += `
      <div class="pdf-item">
        <input value="${pdf.title}" onchange="editItem('pdf', ${pdf.id}, 'title', this.value)" placeholder="Judul PDF">
        <input value="${pdf.link}" onchange="editItem('pdf', ${pdf.id}, 'link', this.value)" placeholder="Link URL">
        <button class="btn-danger" onclick="deleteItem('pdf', ${pdf.id})"><i class="fas fa-trash"></i></button>
      </div>
    `;
  });
  
  document.getElementById('pdfList').innerHTML = html;
}

// ================= RENDER VIP =================
function renderVip(v) {
  const featuresText = (v.features || []).join('\n');
  const classesText = (v.classes || []).join('\n');
  const pricesText = (v.prices || []).map(p => `${p.name}|${p.price}|${p.bonus || ''}`).join('\n');
  
  const html = `
    <div class="vip-field">
      <label><i class="fas fa-heading"></i> Judul Utama</label>
      <input id="vipTitle" value="${v.title || ''}" placeholder="Contoh: 🔥 JOIN VIP PREMIUM 🔥">
    </div>
    
    <div class="vip-field">
      <label><i class="fas fa-tag"></i> Sub Judul</label>
      <input id="vipSubtitle" value="${v.subtitle || ''}" placeholder="Contoh: Akses Semua Kelas">
    </div>
    
    <div class="vip-field">
      <label><i class="fab fa-discord" style="color: #5865F2;"></i> Link Discord</label>
      <input id="vipDiscord" value="${v.discordLink || ''}" placeholder="https://discord.gg/..." style="border-color: #5865F2;">
      <small style="color: #94a3b8; margin-top: 5px;">Tombol Discord akan muncul di halaman utama</small>
    </div>
    
    <div class="vip-field">
      <label><i class="fas fa-align-left"></i> Deskripsi</label>
      <textarea id="vipDesc" placeholder="Deskripsi panjang tentang VIP...">${v.description || ''}</textarea>
    </div>
    
    <div class="vip-field">
      <label><i class="fas fa-check-circle"></i> Fitur (satu per baris)</label>
      <textarea id="vipFeatures" placeholder="Akses semua video&#10;Download PDF&#10;Grup Discord">${featuresText}</textarea>
    </div>
    
    <div class="vip-field">
      <label><i class="fas fa-layer-group"></i> Kelas (satu per baris)</label>
      <textarea id="vipClasses" placeholder="Kelas Trading&#10;Kelas Crypto&#10;Kelas Programming">${classesText}</textarea>
    </div>
    
    <div class="vip-field">
      <label><i class="fas fa-tags"></i> Harga (format: Nama|Harga|Bonus)</label>
      <textarea id="vipPrices" placeholder="1 Bulan|Rp150.000|&#10;3 Bulan|Rp400.000|Bonus Ebook&#10;Lifetime|Rp1.200.000|Akses Selamanya">${pricesText}</textarea>
    </div>
    
    <button class="btn-primary" onclick="saveVip()" style="width: 100%; margin-top: 15px; padding: 18px;">
      <i class="fas fa-save"></i> Simpan Semua Data VIP
    </button>
  `;
  
  document.getElementById('vipEditor').innerHTML = html;
}

// ================= CRUD FUNCTIONS =================
async function addCategory() {
  const name = document.getElementById('newCat').value.trim();
  if (!name) return alert('Nama kategori wajib diisi!');
  
  await fetch('/category', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  
  document.getElementById('newCat').value = '';
  loadData();
}

async function addAlbum(catId) {
  const input = document.getElementById(`albumInput_${catId}`);
  const name = input.value.trim();
  if (!name) return alert('Nama album wajib diisi!');
  
  await fetch('/album', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ catId, name })
  });
  
  loadData();
}

async function addVideo(albumId) {
  const title = document.getElementById(`videoTitle_${albumId}`).value.trim();
  const link = document.getElementById(`videoLink_${albumId}`).value.trim();
  if (!title || !link) return alert('Judul dan link video wajib diisi!');
  
  await fetch('/video', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ albumId, title, link })
  });
  
  loadData();
}

async function addPdf() {
  const title = document.getElementById('pdfTitle').value.trim();
  const link = document.getElementById('pdfLink').value.trim();
  if (!title || !link) return alert('Judul dan link PDF wajib diisi!');
  
  await fetch('/pdf', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, link })
  });
  
  document.getElementById('pdfTitle').value = '';
  document.getElementById('pdfLink').value = '';
  loadData();
}

async function editItem(type, id, field, value) {
  if (!value.trim()) return;
  
  await fetch(`/${type}/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [field]: value })
  });
}

async function deleteItem(type, id) {
  if (!confirm(`Yakin ingin menghapus ${type} ini?`)) return;
  
  await fetch(`/${type}/${id}`, { method: 'DELETE' });
  loadData();
}

async function saveVip() {
  const features = document.getElementById('vipFeatures').value.split('\n').map(f => f.trim()).filter(f => f);
  const classes = document.getElementById('vipClasses').value.split('\n').map(c => c.trim()).filter(c => c);
  const priceLines = document.getElementById('vipPrices').value.split('\n').filter(p => p.trim());
  
  const prices = priceLines.map(line => {
    const parts = line.split('|');
    return {
      name: parts[0]?.trim() || '',
      price: parts[1]?.trim() || '',
      bonus: parts[2]?.trim() || ''
    };
  });

  const vipPayload = {
    title: document.getElementById('vipTitle').value.trim(),
    subtitle: document.getElementById('vipSubtitle').value.trim(),
    discordLink: document.getElementById('vipDiscord').value.trim(),
    description: document.getElementById('vipDesc').value.trim(),
    features,
    classes,
    prices
  };

  await fetch('/joinvip', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(vipPayload)
  });
  
  alert('✅ Data VIP berhasil disimpan!');
  loadData();
}

// ================= GLOBAL FUNCTIONS =================
window.login = login;
